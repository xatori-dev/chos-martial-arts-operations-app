name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test

      - name: Verify staging build environment
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_ENABLE_DEVELOPER_ACCOUNT: ${{ vars.VITE_ENABLE_DEVELOPER_ACCOUNT }}
        run: |
          if [ -z "$VITE_SUPABASE_URL" ]; then
            echo "VITE_SUPABASE_URL is required for staging Pages builds."
            exit 1
          fi
          if [ -z "$VITE_SUPABASE_PUBLISHABLE_KEY" ]; then
            echo "VITE_SUPABASE_PUBLISHABLE_KEY is required for staging Pages builds."
            exit 1
          fi
          if [ "$VITE_ENABLE_DEVELOPER_ACCOUNT" != "true" ]; then
            echo "VITE_ENABLE_DEVELOPER_ACCOUNT must be true for the selected public staging pilot."
            exit 1
          fi
          case "$VITE_SUPABASE_URL" in
            *zfuwbbepsnmmlpgfkmhz.supabase.co*) ;;
            *)
              echo "VITE_SUPABASE_URL must point to Cho's staging Supabase project."
              exit 1
              ;;
          esac

      - name: Build GitHub Pages artifact
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_ENABLE_DEVELOPER_ACCOUNT: ${{ vars.VITE_ENABLE_DEVELOPER_ACCOUNT }}
        run: npm run build:pages

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
